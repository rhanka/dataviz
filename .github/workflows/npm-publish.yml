name: npm Publish

# Publication des packages @sentropic/dataviz-* via npm Trusted Publishing (OIDC).
# Déclenchée par un tag `v<version>`. Aucun token : l'identité OIDC du workflow
# est autorisée côté npm comme "trusted publisher" pour chaque package.
#
# Trusted publisher attendu côté npm (par package) :
#   rhanka/dataviz + npm-publish.yml

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run verify

  release-guard:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      RELEASE_BRANCH: ${{ github.event.repository.default_branch }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is merged into default branch
        run: |
          git fetch origin "${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/${RELEASE_BRANCH}"; then
            echo "::error::Refusing to publish ${TAG}: ${GITHUB_SHA} is not merged into origin/${RELEASE_BRANCH}."
            exit 1
          fi
      - name: Verify package versions match tag
        run: |
          EXPECTED="${TAG#v}"
          for pkg in dataviz-core dataviz-svelte dataviz-react dataviz-vue; do
            ACTUAL=$(node -p "require('./packages/${pkg}/package.json').version")
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "::error::Tag ${TAG} expects ${EXPECTED} but packages/${pkg} is ${ACTUAL}."
              exit 1
            fi
          done
          echo "All dataviz packages match ${EXPECTED}"

  publish:
    needs: release-guard
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (OIDC trusted publishing)
        run: npm install -g npm@latest
      - name: Install and build
        run: |
          npm ci
          npm run build
      - name: Publish packages
        run: |
          npm publish --workspace @sentropic/dataviz-core --access public
          npm publish --workspace @sentropic/dataviz-svelte --access public
          npm publish --workspace @sentropic/dataviz-react --access public
          npm publish --workspace @sentropic/dataviz-vue --access public

  post-publish-check:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Wait for npm propagation
        run: |
          VERSION="${TAG#v}"
          for pkg in dataviz-core dataviz-svelte dataviz-react dataviz-vue; do
            ok=""
            for attempt in $(seq 1 20); do
              if npm view "@sentropic/${pkg}@${VERSION}" version --silent > /dev/null 2>&1; then
                echo "@sentropic/${pkg}@${VERSION} available."
                ok=1; break
              fi
              echo "Waiting for ${pkg} propagation, attempt ${attempt}/20..."
              sleep 15
            done
            if [ -z "$ok" ]; then echo "::error::Timed out waiting for ${pkg}."; exit 1; fi
          done
