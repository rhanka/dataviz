name: GitHub Pages

# Build the three framework demos (Svelte / React / Vue) AND the docs + gallery
# website (apps/site), then deploy them to GitHub Pages behind a landing page.
# The demos use a relative `base` (served from their own sub-paths); the docs
# website is an SPA with an absolute base `/dataviz/site/` and a 404.html
# fallback so its deep links resolve on a static host.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on a new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # Builds packages (core + adapters) then every app workspace, including
      # the three demos AND apps/site (the docs + gallery website). The site's
      # vite config defaults its base to `/dataviz/site/` for this deployment.
      - run: npm run build
      - name: Assemble site (landing + per-framework demos + docs website)
        run: |
          mkdir -p _site
          cp apps/pages-landing.html _site/index.html
          cp -r apps/docs/dist _site/svelte
          cp -r apps/docs-react/dist _site/react
          cp -r apps/docs-vue/dist _site/vue
          # Docs + gallery website (SPA) under /site, with a 404.html fallback
          # so deep links (e.g. /site/charts/treemap) resolve on GitHub Pages.
          mkdir -p _site/site
          cp -r apps/site/dist/* _site/site/
          cp apps/site/dist/index.html _site/site/404.html
          # GitHub Pages serves the PUBLISHED-SITE-ROOT 404.html for any missing
          # sub-path, so the docs SPA deep links (/site/charts/*) need the SPA
          # index served as the root 404 fallback (the /site/404.html above is
          # not consulted by Pages for sub-path 404s).
          cp apps/site/dist/index.html _site/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
