name: GitHub Pages

# Build the three framework demos (Svelte / React / Vue) AND the docs + gallery
# website (apps/site), then deploy them to GitHub Pages behind a landing page.
# The demos use a relative `base` (served from their own sub-paths); the docs
# website is an SPA with an absolute base `/dataviz/site/` and a 404.html
# fallback so its deep links resolve on a static host.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on a new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # Builds packages + every app workspace. apps/site builds at base "/"
      # (DV_SITE_BASE) so the docs website serves at the custom-domain ROOT
      # (dataviz.sent-tech.ca). The three demos use a relative base (served
      # from /demos/*).
      - run: DV_SITE_BASE=/ npm run build
      - name: Assemble site (docs website at root + per-framework demos)
        run: |
          mkdir -p _site
          # Docs + gallery website (apps/site, base "/") at the custom-domain root.
          cp -r apps/site/dist/* _site/
          # GitHub Pages serves the published-site-root 404.html for any missing
          # path, so the docs SPA index doubles as the deep-link fallback.
          cp apps/site/dist/index.html _site/404.html
          # Custom domain (keeps the Pages custom-domain binding across deploys).
          echo dataviz.sent-tech.ca > _site/CNAME
          # The three framework demos (relative base) under /demos/*.
          mkdir -p _site/demos
          cp -r apps/docs/dist _site/demos/svelte
          cp -r apps/docs-react/dist _site/demos/react
          cp -r apps/docs-vue/dist _site/demos/vue
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
